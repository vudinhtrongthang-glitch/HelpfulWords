<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shuffle Cards</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Container chứa các lá bài ảo để tạo hiệu ứng xáo trộn */
        .card-container {
            position: relative;
            width: 80vw;
            max-width: 300px;
            height: 70vh;
            max-height: 480px;
        }

        #card {
            width: 100%;
            height: 100%;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            font-size: 1.4rem;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        /* Các lớp bài ảo phía sau để tạo hiệu ứng xoẹt xoẹt */
        .ghost-card {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            box-sizing: border-box;
        }

        @keyframes shuffle-main {
            0% { transform: scale(1); }
            20% { transform: translate(-15px, 10px) rotate(-5deg) scale(0.95); }
            40% { transform: translate(20px, -15px) rotate(8deg); }
            60% { transform: translate(-10px, -20px) rotate(-3deg) scale(1.05); }
            80% { transform: translate(10px, 15px) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes ghost-left {
            0% { opacity: 0.5; transform: translate(0, 0); }
            50% { opacity: 0.8; transform: translate(-60px, 20px) rotate(-15deg); }
            100% { opacity: 0; transform: translate(0, 0); }
        }

        @keyframes ghost-right {
            0% { opacity: 0.5; transform: translate(0, 0); }
            50% { opacity: 0.8; transform: translate(60px, -20px) rotate(15deg); }
            100% { opacity: 0; transform: translate(0, 0); }
        }

        .shuffling-main { animation: shuffle-main 0.6s ease-in-out infinite; }
        .shuffling-left { animation: ghost-left 0.4s ease-in-out infinite; }
        .shuffling-right { animation: ghost-right 0.4s ease-in-out infinite delay 0.1s; }

        .pattern { width: 80px; height: 80px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="card-container" onclick="startShuffle()">
        <div id="ghost1" class="ghost-card"></div>
        <div id="ghost2" class="ghost-card"></div>
        <div id="card">
            <div id="content">
                <svg class="pattern" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="0.5">
                    <circle cx="50" cy="50" r="40" />
                    <circle cx="50" cy="50" r="30" />
                    <path d="M50 10 L50 90 M10 50 L90 50 M21 21 L79 79 M79 21 L21 79" />
                    <circle cx="50" cy="50" r="5" fill="white"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const messages = [
            "Proceed with uncertainty", "Let people deal with the burden of you being you",
            "Start first, feel better later", "Walking in sunlight, looking around",
            "Take inspired actions", "Aim low", "Pressure is in your head",
            "Patient is to observe how impatient you are", "Non judgmental is to observe how judgmental you are",
            "Best medicines: Sunlight, exercise, self-confidence, friends", "Decide the few friends you have",
            "Be yourself, so that the people looking for you can find you", "Sip and savor",
            "Do you know the next step?", "See enough, hurt enough, learn enough, receive enough",
            "Take things lightly", "A bad day for the ego is a great day for the soul",
            "According to plan, not to mood", "Learn to delay gratification",
            "Be creative with everyday problems", "Trust what you knew then not how you feel now",
            "Everything is meaningful", "Có làm mới có làm sai. Có làm sai mới có làm tốt",
            "Không có gì để nói thì đừng nói gì - Mark Twain", "Collect enough data before deciding",
            "Consider the perimeter of your projects", "You don’t have to always be emotional available",
            "Avoid your most comfortable self", "Necessity is a great teacher",
            "Cure for loneliness: Join every groups, be curious about everything",
            "Confidence and fear both requires believing in something that hasn’t happened yet",
            "Be comfortable with being uncomfortable", "Maturity is just being anxious about better problems",
            "Disciplined is just being addicted to better things", "Say no to the 'kinda yes'",
            "Có trách nghiệm với xã hội hay với lương tâm?", "Có thoả mãn hay có ý nghĩa?",
            "Sợ hay tự tin?", "How you feel at the moment shouldn’t DOMINATE what you are doing",
            "Self esteem is a choice that you should make everytime", "The receiver gives, the giver receives",
            "It’s okay to be without objective, just be present", "Shine brightly on the present moment",
            "Big funnel, small filter", "20% táo bạo mỗi ngày", "Life is a series of dots, not a line",
            "Get civilized, learn", "Minimize future regrets"
        ];

        let isShuffling = false;

        function startShuffle() {
            if (isShuffling) return;
            isShuffling = true;

            const card = document.getElementById('card');
            const ghost1 = document.getElementById('ghost1');
            const ghost2 = document.getElementById('ghost2');
            const content = document.getElementById('content');

            card.classList.add('shuffling-main');
            ghost1.classList.add('shuffling-left');
            ghost2.classList.add('shuffling-right');
            content.style.opacity = "0";

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * messages.length);
                content.innerHTML = messages[randomIndex];
                content.style.opacity = "1";
                
                card.classList.remove('shuffling-main');
                ghost1.classList.remove('shuffling-left');
                ghost2.classList.remove('shuffling-right');
                isShuffling = false;
            }, 1200); // Thời gian shuffle 1.2 giây
        }
    </script>
</body>
</html>
