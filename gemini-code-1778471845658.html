<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shuffle Cards</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            perspective: 1000px;
        }

        #card {
            width: 80vw;
            max-width: 300px;
            height: 70vh;
            max-height: 480px;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            position: relative;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Họa tiết nhành hoa mềm mại ở 4 góc */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }
        .top-left { top: 12px; left: 12px; }
        .top-right { top: 12px; right: 12px; transform: scaleX(-1); }
        .bottom-left { bottom: 12px; left: 12px; transform: scaleY(-1); }
        .bottom-right { bottom: 12px; right: 12px; transform: scale(-1); }

        .content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            backface-visibility: hidden;
        }

        .message-text {
            font-size: 1.4rem;
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        @keyframes flipSpin {
            0% { transform: rotateY(0) scale(1); }
            50% { transform: rotateY(540deg) scale(0.85); }
            100% { transform: rotateY(1080deg) scale(1); }
        }

        .animating {
            animation: flipSpin 0.9s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .pattern-main { width: 70px; height: 70px; opacity: 0.6; }
        
        .floral-svg { width: 100%; height: 100%; fill: none; stroke: white; stroke-width: 0.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="card" onclick="startShuffle()">

        <div class="corner top-right"><svg class="floral-svg" viewBox="0 0 40 40"><path d="M5,35 Q5,5 35,5 M5,5 L12,12 M5,5 L15,8 M5,5 L8,15" /><circle cx="35" cy="5" r="1.5" fill="white"/></svg></div>
        <div class="corner bottom-left"><svg class="floral-svg" viewBox="0 0 40 40"><path d="M5,35 Q5,5 35,5 M5,5 L12,12 M5,5 L15,8 M5,5 L8,15" /><circle cx="35" cy="5" r="1.5" fill="white"/></svg></div>
        <div class="corner bottom-right"><svg class="floral-svg" viewBox="0 0 40 40"><path d="M5,35 Q5,5 35,5 M5,5 L12,12 M5,5 L15,8 M5,5 L8,15" /><circle cx="35" cy="5" r="1.5" fill="white"/></svg></div>

        <div class="content-wrapper" id="content">
            <svg class="pattern-main" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="0.5">
                <circle cx="50" cy="50" r="40" />
                <circle cx="50" cy="50" r="30" />
                <path d="M50 10 L50 90 M10 50 L90 50 M21 21 L79 79 M79 21 L21 79" />
                <circle cx="50" cy="50" r="4" fill="white"/>
            </svg>
        </div>
    </div>
